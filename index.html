<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>TOWER CLIMBER</title>
  </head>
  <body>

    <div id="tela-inicial" class="tela">
        <button id="btn-start" class="btn-style" onclick="mudarTela('torre-tela')">START</button>
      </div>

    <div id="tela-classe" class="tela oculto">
        <div id="classe-container" class="container">classes</div>
      </div>
    
    <div id="torre-tela" class="tela oculto">
      
      <div id="layout-pc">
        <div id cidade-conteudo>
          <div id="Forja" class="predio" onclick="mudarTela('forja-tela')">FORJA</div>
          <div id="biblioteca" class="predio" onclick="mudarTela('biblioteca-tela')">BIBLIOTECA</div>
          <div id="taverna" class="predio" onclick="mudarTela('taverna-tela')">TAVERNA</div>
          <div id="guilda" class="predio" onclick="mudarTela('guilda-tela')">GUILDA</div>
          <div id="templo" class="predio" onclick="mudarTela('templo-tela')">TEMPLO</div>
        </div>
      </div>
        
      <div id="layout-mobile">
        <div id="torre-conteudo">
          <div id="Batalha" class="contrucao jersey-15" onclick="mudarTela('battle-tela'); atualizarTorre()">BATTLE</div>
              
          <div id="Forja" class="contrucao jersey-15" onclick="mudarTela('forja-tela'); categoriaId('weapon')">FORJA</div>
              
          <div id="shop" class="contrucao jersey-15" onclick="mudarTela('Shop-tela'); mudarItem('Potion'); ">MARKET</div>
              
          <div id="taverna" class="contrucao jersey-15" onclick="mudarTela('taverna-tela'); mostrarStatusTaverna();">TAVERNA</div>
              
          <div id="guilda" class="contrucao jersey-15" onclick="mudarTela('guilda-tela')">GUILDA</div>
        </div>
        
        <div id="MENU-BAR" class="width100 DisplayFlex">
          
          <div id="" class="XX ImgCover"><img id="IMG" src="/imagens/Icons/Character.png" alt="" onclick="mudarTela('perfil-tela')"></div>
          
          <div id="" class="XX ImgCover"><img id="IMG" src="/imagens/Icons/Backpack.png" alt="" onclick="mudarTela('inventario-tela'); criarInventario(); categoriaSelecionada('CAll')"></div>
          
            <div id="" class="XX ImgCover"><img id="IMG" src="/imagens/Sprites/INN.png" alt=""></div>
            
          <div id="" class="XX ImgCover"><img id="IMG" src="/imagens/Icons/Mapa.png" alt=""></div>
        </div>
      </div>
    </div>

<!-----------------------------------------------------
     TELA DE PERDIL
------------------------------------------------------>
    <div id="perfil-tela" class="tela oculto">
      
      <div id="Perfil-body" class="">
        
      </div>
      
      <div id="Botoes-container">
        <button class="btnPL" onclick="">SEI NAO</button>
        <button class="btnPL" onclick="mudarTela('torre-tela')">VOLTAR</button>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
