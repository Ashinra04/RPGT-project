<!doctype html>

    <title>Game Project</title>
    <link rel="stylesheet" href="style.css" />

  <body>
    <div id="tela-inicial" class="tela">
      <button id="btn-start" class="btn-style" onclick="mudarTela('torre-tela')">START</button>

    <div id="tela-classe" class="tela oculto">

    <div id="torre-tela" class="tela oculto">
      
      <div id="layout-pc">
        <div id cidade-conteudo>

            <div id="biblioteca" class="predio" onclick="mudarTela('biblioteca-tela')">BIBLIOTECA</div>
            <div id="taverna" class="predio" onclick="mudarTela('taverna-tela')">TAVERNA</div>

      </div>

            <div id="Batalha" class="contrucao" onclick="mudarTela('battle-tela')">BATTLE</div>

            <div id="shop" class="contrucao" onclick="mudarTela('Shop-tela')">SHOP</div>

      </div>
    </div>
    
    <div id="battle-tela" class="tela oculto">
      <p>BATTLE</p>
      <button id="btn-voltar" class="btn-style" onclick="mudarTela('torre-tela')">VOLTAR</button>

    <div id="Shop-tela" class="tela oculto">
      
      <div id="Title-container" class="Container">
        <div id="titulo"><h2>Shop</h2></div>
      </div>
      
      <div id="NPC-container" class="Container">
        <div id="NPC"></div>
        <div id="div-dialogo">.......</div>
      </div>
      
      <div id="Items-container">

        <div class="slots"></div> <div class="slotsE">></div>
        <div class="slots"></div> <div class="slots"></div>
        <div class="slots"></div> <div class="slots"></div>
        <div class="slots"></div> <div class="slots"></div>
        <div class="slots"></div> <div class="slots"></div>
        <div class="slots"></div> <div class="slots"></div>
        <div class="slots"></div> <div class="slots"></div>
      </div>
      
      <div id="Botoes-container">
        <button class="btnL">BUY</button>
        <button class="btnL">SELL</button>
        <button class="btnL" onclick="mudarTela('torre-tela')">VOLTAR</button>
      </div>
      
    </div>
    
    <div id="forja-tela" class="tela oculto">
      <div id="Forja-Title">FORJA</div>

        <div id="NPC-F">
        </div>
        <div id="NPCF-falas"></div>
      </div>

      <div id="Botoes-container">
        <button class="btnF">BUY</button>
        <button class="btnF">UPGRADE</button>
        <button class="btnF">ENCHANTER</button>
        <button class="btnF" onclick="mudarTela('torre-tela')">VOLTAR</button>
      </div>
    </div>
    
    <div id="taverna-tela" class="tela oculto">
      <div id="taverna-container">
        
        <div id="taverna-body"></div>
        
        <div id="Botoes-container">
        <button class="btnT">BUY</button>
        <button class="btnT">UPGRADE</button>

        <button class="btnT" onclick="mudarTela('torre-tela')">VOLTAR</button>

      </div>
    </div>

      <<div id="guilda-container">
        
        <div id="guilda-body"></div>
        
        <div id="Botoes-container">
        <button class="btnG">BUY</button>
        <button class="btnG">UPGRADE</button>
        <button class="btnG">ENCHANTER</button>
        <button class="btnG" onclick="mudarTela('torre-tela')">VOLTAR</button>

      </div>
