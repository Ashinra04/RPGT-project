<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>TOWER CLIMBER</title>
  </head>
  <body>
<!-----------------------------------------------------
     TELA INICIAL
------------------------------------------------------>

    <div id="tela-inicial" class="tela">
      <button id="btn-start" class="btn-style" onclick="mudarTela('torre-tela')">START</button>
    </div>

    <div id="tela-classe" class="tela oculto">
      <div id="classe-container" class="container">classes</div>
    </div>
    
    <div id="torre-tela" class="tela oculto">
      
      <div id="layout-pc">
        <div id cidade-conteudo>
          <div id="Forja" class="predio" onclick="mudarTela('forja-tela')">FORJA</div>
            <div id="biblioteca" class="predio" onclick="mudarTela('biblioteca-tela')">BIBLIOTECA</div>
            <div id="taverna" class="predio" onclick="mudarTela('taverna-tela')">TAVERNA</div>
            <div id="guilda" class="predii" onclick="mudarTela('guilda-tela')">GUILDA</div>
            <div id="templo" class="predio" onclick="mudarTela('templo-tela')">TEMPLO</div>
        </div>
      </div>
      
      <div id="layout-mobile">
        <div id="torre-conteudo">
            <div id="Batalha" class="contrucao" onclick="mudarTela('battle-tela')">BATTLE</div>
            
            <div id="Forja" class="contrucao" onclick="mudarTela('forja-tela')">FORJA</div>
            
            <div id="shop" class="contrucao" onclick="mudarTela('Shop-tela')">MARKET</div>
            
            <div id="taverna" class="contrucao" onclick="mudarTela('taverna-tela')">TAVERNA</div>
            
            <div id="guilda" class="contrucao" onclick="mudarTela('guilda-tela')">GUILDA</div>
        </div>
      </div>
    </div>
<!----------------------------------------------------->


<!-----------------------------------------------------
     TELA DE BATALHA
------------------------------------------------------>
    <div id="battle-tela" class="tela oculto">
      <p>BATTLE</p>
      <button id="btn-voltar" class="btn-style" onclick="mudarTela('torre-tela')">VOLTAR</button>
    </div>
<!----------------------------------------------------->


<!-----------------------------------------------------
     TELA DO SHOP
------------------------------------------------------>
    <div id="Shop-tela" class="tela oculto">
      
      <div id="Title-container" class="Container width100">
        <div id="titulo"><h2>Market</h2></div>
      </div>
      
      <div id="NPC-container" class="Container width100">
        <div id="NPC"></div>
        <div id="div-dialogo">
          <div id="InformacoesItems">
            <div id="ItemsInfos">
              <div id="ItemIcon">
                <img src="/imagens/Items/Potion.png" alt=""></div>
              <div id="ItemNome">POTION</div>
            </div>
            <div id="ItemInfo">
              <p id="text">Uma poçao de cura usada para regenera o hp</p>
              <br>
              <h2 id="text">Voce tem: (valor)</h2>
              <br>
              <h2 id="text">Disponivel para comprar: (valor)</h2>
              </div>
          </div>
          <div id="btnComprar"><button class="btnComprar">COMPRAR</button></div>
        </div>
      </div>
      
      <div id="Items-container">
        <div id="slot1E" class="slotsE">❮</div>
        <div id="Potion" class="slots"></div>
        <div id="Potionx2" class="slots"></div>
        <div id="slot4E" class="slotsE">❯</div>
        <div id="Energy" class="slots"></div>
        <div id="Energyx2" class="slots"></div>
        <div id="Elixir" class="slots"></div>
        <div id="Full_heal" class="slots"></div>
        <div id="PoisonP" class="slots"></div>
        <div id="FireP" class="slots"></div>
        <div id="FreezeP" class="slots"></div>
        <div id="ElectricP" class="slots"></div>
        <div id="Antidote" class="slots"></div>
        <div id="Revive" class="slots"></div>
        <div id="Torch" class="slots"></div>
        <div id="DeathP" class="slots"></div>
      </div>
      
      <div id="Botoes-container">
        <button class="btnL">BUY</button>
        <button class="btnL">SELL</button>
        <button class="btnL" onclick="mudarTela('torre-tela')">VOLTAR</button>
      </div>
    </div>
<!----------------------------------------------------->


<!-----------------------------------------------------
     TELA DA FORJA
------------------------------------------------------>
    <div id="forja-tela" class="tela oculto">
      <div id="Forja-Title">FORJA</div>
        
      <div id="forja-NPC">
        <div id="NPC-F">
        </div>
        <div id="NPCF-falas"></div>
      </div>
        
      <div id="Forja-body"></div>
        
      <div id="Botoes-container">
        <button class="btnF">BUY</button>
        <button class="btnF">UPGRADE</button>
        <button class="btnF">ENCHANTER</button>
        <button class="btnF" onclick="mudarTela('torre-tela')">VOLTAR</button>
      </div>
    </div>
<!----------------------------------------------------->


<!-----------------------------------------------------
     TELA DA TAVERNA
------------------------------------------------------>
    <div id="taverna-tela" class="tela oculto">
      <div id="Taverna-Title" class="width100">TAVERNA</div>
      
      <div id="Taverna-NPC" class="width100">
        <div id="NPC-T"></div>
        <div id="NPCT-falas"></div>
      </div>
      
      <div id="taverna-body" class="width100">
        <div id="row1">
          
          <div id="rowTitle">
            <div id="Title-ST1">Status</div>
          </div>
          
          <div id="rowImagens2">
            <div id="ST1"></div>
          </div>
        </div>
        
        <div id="row2">
          
          <div id="rowTitle">
            <div id="Title-contratar">CONTRATAR</div>
            <div id="Title-descansar">DESCANSAR</div>
          </div>
          
          <div id="rowImagens">
            <div id="Contratar"><img id="IMG" src="/imagens/Sprites/Contratar_icon.png" alt=""></div>
            <div id="Sleep"><img id="IMG" src="/imagens/Sprites/INN.png" alt=""></div>
          </div>

        </div>
      </div>
        
      <div id="Botoes-container">
        <button class="btnT">VENDER</button>
        <button class="btnT" onclick="mudarTela('torre-tela')">VOLTAR</button>
      </div>
    </div>
<!----------------------------------------------------->


<!-----------------------------------------------------
     TELA DA GUILDA
------------------------------------------------------>
    <div id="guilda-tela" class="tela oculto">
      <div id="Guild-Title">GUILDA</div>
      <div id="GNPC"></div>
      
      <div id="guilda-body" class="conteudo">
        <div id="Linha1">
          <div id="Missoes"></div>
          <div id="Bestiario"></div>
        </div>
        <div id="Linha2">
          <div id="AllMissoes">MISSOES COMPLETAS</div>
          <div id="ALL1">...</div>
        </div>
      </div>
      
      <div id="guilda-body2" class="conteudo oculto">
      </div>
        
      <div id="Botoes-container">
        <button class="btnG" onclick="mudarConteudo('guilda-body2')">CONVERSAR</button>
        <button class="btnG" onclick="mudarConteudo('guilda-body')">menu</button>
        <button class="btnG" onclick="mudarTela('torre-tela'); mudarConteudo('guilda-body')">VOLTAR</button>
      </div>
    </div>
<!----------------------------------------------------->
    
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
