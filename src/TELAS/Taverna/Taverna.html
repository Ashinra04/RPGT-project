    <div id="taverna-tela" class="tela oculto">

        <div id="TNPC"></div>
        <div id="TNPC-falas"></div>
      </div>
      
      <div id="TAVERNAOpcoes" class="width100 DisplayFlex Border-2px-Solid">
        
        <div id="row1" class="DisplayFlex width100 BoxSizing">
          <div id="rowTitle" class="DisplayFlex width100">
            <div id="TITLE-STATUS" class="DisplayFlex width100 heigth100 Border-2px-Solid J-C_Center A-I_Center">Status</div>
          </div>
          
          <div id="rowImagens2" class="DisplayFlex heigth100 width100">
            
            <div id="STATUS-BOX" class="width100 heigth100 Border-2px-Solid"></div>
            
          </div>
        </div>
        
        <div id="row2" class="DisplayFlex width100 BoxSizing">

            <div id="Title-contratar" class="DisplayFlex width100 heigth100 Border-2px-Solid J-C_Center A-I_Center">CONTRATAR</div>
            
            <div id="Title-descansar" class="DisplayFlex width100 heigth100 Border-2px-Solid J-C_Center A-I_Center">DESCANSAR</div>
          </div>
          
          <div id="IMGs-Cont-Desc" class="DisplayFlex width100">
            
            <div id="IMG-Contratar" class="width100 heigth100 Border-2px-Solid">
              <img id="IMG" src="/imagens/Sprites/Contratar_icon.png" alt=""></div>
            
            <div id="IMG-Descansar" class="width100 heigth100 Border-2px-Solid">
              <img id="IMG" src="/imagens/Sprites/INN.png" alt=""></div>
          </div>

        </div>
      </div>
        
      <div id="Botoes-container">
