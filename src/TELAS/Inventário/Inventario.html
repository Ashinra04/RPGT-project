<!-----------------------------------------------------
     TELA DE INVENTARIO
------------------------------------------------------>
<div id="inventario-tela" class="oculto">
  <div id="inventario-body" class="">
    <div id="IRow1" class="">
          
      <div id="Gears-box" class="GSboxes">
        <div id="GearsColumn1" class="GearsColumn">
          <div id="SAmulet" class="Gslots"></div>
          <div id="SWeapon" class="Gslots"></div>
          <div id="SRing1" class="Gslots"></div>
        </div>
            
        <div id="GearsColumn2" class="GearsColumn">
          <div id="SHelemt" class="Gslots"></div>
          <div id="SArmor" class="Gslots"></div>
          <div id="SPants" class="Gslots"></div>
          <div id="SBoots" class="Gslots"></div>
        </div>
            
        <div id="GearsColumn3" class="GearsColumn">
          <div id="SGloves" class="Gslots"></div>
          <div id="SShield" class="Gslots"></div>
          <div id="SRing2" class="Gslots"></div>
        </div>
      </div>
          
      <div id="Status-box" class="GSboxes oculto">
        <button class="btnI" onclick="">STATUS</button>
        <div id="" class=""></div>
      </div>
          
      <div id="BtnSG">
        <button class="btnI" onclick="mudarBox('Gears-box')">EQUIPAMENTOS</button>
        <button class="btnI" onclick="mudarBox('Status-box')">STATUS</button>
      </div>
    </div>
        
    <div id="IRow2" class="">
      <div id="items-box" class="">
        <div id="CategoriaItems" class="">
          <div id="CAll" class="SlotCategory DFlexALCenter" onclick="criarInventario(); categoriaSelecionada('CAll')">ALL</div>
          
          <div id="CWeapons" class="SlotCategory DFlexALCenter imgContain" onclick="categoriaWeapon(); categoriaSelecionada('CWeapons')"></div>
          
          <div id="CArmors" class="SlotCategory DFlexALCenter imgContain" onclick="categoriaArmors(); categoriaSelecionada('CArmors')"></div>
          
          <div id="CKeys" class="SlotCategory DFlexALCenter imgContain" onclick="categoriaAcessorios(); categoriaSelecionada('CKeys')"></div>
          
          <div id="CPotions" class="SlotCategory DFlexALCenter imgContain" onclick="categoriaPotions(); categoriaSelecionada('CPotions')"></div>
        </div>
        
        <div id="ItemsSlots" class="">
          <div onclick="abrirModal()" class="SlotInven">
          </div>
        </div>
      </div>
    </div>
    
    <div id="fundo-overlay" class="oculto DFlexALCenter" onclick="fecharModal(event)">
      
      <div id="caixa-flutuante">
        <div id="ItemTitleName"></div>
        
        <div id="ItemsDescricoesbox">
          <p style="color: white; padding: 10px;">Descrição do item aparece aqui...</p>
        </div>
        
        <div id="BotoesBOX">
          <button id="btnEQUIPAR" class="btnInventory">EQUIPAR</button>
          <button id="btnCOMPARAR" class="btnInventory" onclick="">COMPARAR</button>
          <button id="btnFECHAR" class="btnInventory" onclick="document.getElementById('fundo-overlay').classList.add('oculto')">FECHAR</button>
        </div>
      </div>
    
    </div>
    
  </div>
      
  <div id="Botoes-INVEN">
    <button class="btnI" onclick="">SEI SIM</button>
    <button class="btnI" onclick="mudarTela('torre-tela')">VOLTAR</button>
  </div>
</div>
<!----------------------------------------------------->
